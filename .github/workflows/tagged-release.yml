name: 'tagged-release'

on:
  push:
    tags:
      - 'v*'

jobs:
  linux-windows-build:
    runs-on: 'ubuntu-latest'

    permissions: write-all

    outputs:
      upload_url: ${{ steps.automatic_releases.outputs.upload_url }}

    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Init submodules
        run: git submodule update --init --checkout --recursive
      - name: Download avrdude
        run: |
          wget https://github.com/avrdudes/avrdude/releases/download/v8.0/avrdude-v8.0-windows-x86.zip -O resources/modules/win32/avrdude.zip
          unzip resources/modules/win32/avrdude.zip -d resources/modules/win32
          rm -f resources/modules/win32/avrdude.zip
      - name: Download Arduino CLI
        run: |
          wget https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Windows_64bit.zip -O resources/modules/win32/arduino-cli.zip
          unzip resources/modules/win32/arduino-cli.zip -d resources/modules/win32/arduino-cli/
          rm -f resources/modules/win32/arduino-cli.zip
      - name: Download gcc-arm-none-eabi
        run: |
          wget https://seafile.polyus-nt.ru/f/83d0be836d1c491fa3b3/?dl=1 -O build/gcc-arm-none-eabi.zip
      - name: Download IRPCB dependencies
        run: |
          wget https://seafile.polyus-nt.ru/f/6377a640bc344e31bd6d/?dl=1 -O build/irpcb.zip
          unzip build/irpcb.zip -d build/irpcb
          rm -f build/irpcb.zip
      - name: Run the build process with Docker
        uses: addnab/docker-run-action@v3
        with:
          image: electronuserland/builder:wine
          options: -v ${{ github.workspace }}:/project
          run: |
            apt-get update
            apt-get install -y zip
            npm ci
            npm run build
            npm run bundle:linux
            npm run bundle:win
            VERSION=$(node -p "require('./package.json').version")

            mkdir -p outputs
            mkdir -p outputs/seafile-upload
            mkdir -p outputs/windows-release/setup_data

            cp dist/*-setup.exe outputs/windows-release/
            cp build/gcc-arm-none-eabi.zip outputs/windows-release/setup_data/gcc-arm-none-eabi.zip
            
            mkdir -p outputs/windows-release/setup_data/irpcb
            cp -r build/irpcb/bin outputs/windows-release/setup_data/irpcb/bin
            
            mkdir -p outputs/windows-release/setup_data/lapki-compiler/fullgraphmlparser
            cp -r build/lapki-compiler/compiler/library outputs/windows-release/setup_data/lapki-compiler/library
            cp -r build/lapki-compiler/compiler/platforms outputs/windows-release/setup_data/lapki-compiler/platforms
            cp -r build/lapki-compiler/compiler/fullgraphmlparser/templates outputs/windows-release/setup_data/lapki-compiler/fullgraphmlparser/templates
            (
              cd outputs/windows-release
              zip -r "../cyberiada-${VERSION}-windows.zip" .
            )
            cp outputs/cyberiada-${VERSION}-windows.zip outputs/seafile-upload/
            cp dist/*.deb outputs/seafile-upload/
            cp dist/*.snap outputs/seafile-upload/
            cp dist/*.AppImage outputs/seafile-upload/

      - uses: 'marvinpinto/action-automatic-releases@latest'
        id: 'automatic_releases'
        with:
          repo_token: '${{ secrets.GITHUB_TOKEN }}'
          automatic_release_tag: ${{ github.ref_name }}
          prerelease: false
          files: |
            dist/*.deb
            dist/*.snap
            dist/*.AppImage
            dist/*.exe
            outputs/*.zip

  mac-build:
    runs-on: 'macos-latest'

    permissions: write-all

    needs: linux-windows-build

    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - run: npm ci
      - run: npm run build
      - run: npm run bundle:mac

      - name: Extract asset name
        id: extract_asset_name
        run: |
          (cd dist && ls -1 *.dmg) >> asset_name.txt
          echo "asset_name=$(cat asset_name.txt | head -n 1)" >> $GITHUB_OUTPUT

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.linux-windows-build.outputs.upload_url }}
          asset_path: ./dist/${{ steps.extract_asset_name.outputs.asset_name }}
          asset_name: ${{ steps.extract_asset_name.outputs.asset_name }}
          asset_content_type: application/octet-stream
